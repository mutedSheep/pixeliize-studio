<div id="auth-modal" class="fixed inset-0 z-[80] hidden flex items-center justify-center p-4">
  <div class="modal-backdrop absolute inset-0 bg-black/70" onclick="closeAuthModal()"></div>
  <div class="modal-box relative bg-navy rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" style="border:1px solid rgba(91,184,212,0.15)">
    <!-- Gradient Top Bar -->
    <div class="h-1 w-full" style="background:linear-gradient(90deg,#5BB8D4,#4A7CC7,#8B5CF6,#C45FA0)"></div>

    <div class="p-8">
      <!-- Logo -->
      <div class="text-center mb-6">
        <img src="images/logo-with-text.png" alt="Pixeliize Studio Logo" class="h-8 mx-auto mb-4 object-contain"/>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-white/10 mb-6">
        <button id="tab-login" class="tab-btn active flex-1 pb-3 text-sm font-semibold text-gray-300" onclick="switchAuthTab('login')">Login</button>
        <button id="tab-signup" class="tab-btn flex-1 pb-3 text-sm font-semibold text-gray-500" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="form-login">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Password</label>
            <input type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
          </div>
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
              <input type="checkbox" class="rounded"/>
              Remember me
            </label>
            <a class="text-xs text-cyan-400 hover:text-cyan-300 cursor-pointer">Forgot password?</a>
          </div>
        </div>
        <button class="btn-primary w-full mt-6 py-3 rounded-xl text-white font-semibold text-sm"><span>Login to Account</span></button>
        <div class="relative my-5">
          <div class="border-t border-white/10"></div>
          <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-navy text-gray-500 text-xs px-3">or continue with</span>
        </div>
        <button class="w-full border border-white/10 rounded-xl py-2.5 text-sm text-gray-300 font-medium hover:bg-white/5 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <!-- Signup Form -->
      <div id="form-signup" class="hidden">
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">First Name</label>
              <input type="text" placeholder="Juan" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Last Name</label>
              <input type="text" placeholder="Dela Cruz" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Password</label>
            <input type="password" placeholder="Min. 8 characters" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">Confirm Password</label>
            <input type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white text-sm placeholder-gray-600"/>
          </div>
          <label class="flex items-start gap-2 text-xs text-gray-400 cursor-pointer">
            <input type="checkbox" class="mt-0.5 rounded"/>
            <span>I agree to the <a class="text-cyan-400 hover:underline">Terms of Service</a> and <a class="text-cyan-400 hover:underline">Privacy Policy</a></span>
          </label>
        </div>
        <button class="btn-primary w-full mt-6 py-3 rounded-xl text-white font-semibold text-sm"><span>Create Account</span></button>
        <div class="relative my-5">
          <div class="border-t border-white/10"></div>
          <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-navy text-gray-500 text-xs px-3">or</span>
        </div>
        <button class="w-full border border-white/10 rounded-xl py-2.5 text-sm text-gray-300 font-medium hover:bg-white/5 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>
      </div>
    </div>
    <!-- Close Button -->
    <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
</div>
